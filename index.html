<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome, Users!</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="greetings">
        <div class="greet">
            <h1>Welcome to our team portfolio!</h1>
            <h3>We are a team of students driven by ideas, collaboration, and creativity.
                Explore our projects, discover our skills, <br> and journey as we grow in the field of technology.
            </h3>

            <button onclick="location.href='home.html'">Visit Web</button>
        </div>
    </div>

    <script>
        window.onmousemove = (e) => {
            // amo yaa ang nag hihimo san particles
            let crystal = document.createElement('i');

            // tapos amo yaa ang position sa irarum sa cursor
            crystal.style.left = e.pageX + 'px';
            crystal.style.top = e.pageY + 'px';

            // ang siza yaa naka random para magical talaga ang size niya between 2px and 14px
            let size = Math.random() * 12 + 2;
            crystal.style.width = size + 'px';
            crystal.style.height = size + 'px';

            // indadagdag lng yaa for the particle effect
            document.body.appendChild(crystal);

            // amo ang reason why after san 1 second mawawara ang nauna mag luwas na particles
            setTimeout(() => {
                crystal.remove();
            }, 1000);
        };
    </script>
</body>

</html>
